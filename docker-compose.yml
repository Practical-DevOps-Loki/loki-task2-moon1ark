version: '3.8'

services:
  webapp: 
    build: .
    labels:
      webapp: "varlogs"
    ports:
      - "8080:3000"
    volumes:
      - log-data:/app/log/
    environment:
      - PORT=3000
      - LOG_PATH=/app/log/app.log
    depends_on:
      grafana:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    ports:
      - "9090:3000"
    volumes:
      - ./loki-config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  loki:
    image: grafana/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail
    volumes:
      - ./loki-config/promtail.yaml:/etc/promtail/webapp-config.yaml
      - log-data:/var/log/webapp
    command: -config.file=/etc/promtail/webapp-config.yaml
    depends_on:
      - loki

volumes:
  log-data: